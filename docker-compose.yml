services:
  postgres:
    image: postgres:16-alpine
    container_name: p2p-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-tracker
    env_file:
      - .env
    environment:
      APP_MODE: tracker
      PORT: ${TRACKER_PORT}
    ports:
      - "${TRACKER_PORT}:${TRACKER_PORT}"
    restart: unless-stopped

  peer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-peer
    depends_on:
      - tracker
      - postgres
    env_file:
      - .env
    environment:
      APP_MODE: peer
      PORT: ${PEER_PORT}
      TRACKER_URL: http://tracker:${TRACKER_PORT}
      PUBLIC_BASE_URL: http://peer:${PEER_PORT}
      DATA_DIR: /app/data
      META_DIR: /app/data/meta
      CHUNKS_DIR: /app/data/chunks
      DOWNLOADS_DIR: /app/data/downloads
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    user: "0:0"
    ports:
      - "${PEER_PORT}:${PEER_PORT}"
    volumes:
      - peer_data:/app/data
    restart: unless-stopped

  peer2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p-peer-2
    depends_on:
      - tracker
      - postgres
    env_file:
      - .env
    environment:
      APP_MODE: peer
      PORT: ${PEER2_PORT}
      PEER_ID: ${PEER2_ID}
      TRACKER_URL: http://tracker:${TRACKER_PORT}
      PUBLIC_BASE_URL: http://peer2:${PEER2_PORT}
      DATA_DIR: /app/data
      META_DIR: /app/data/meta
      CHUNKS_DIR: /app/data/chunks
      DOWNLOADS_DIR: /app/data/downloads
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    user: "0:0"
    ports:
      - "${PEER2_PORT}:${PEER2_PORT}"
    volumes:
      - peer2_data:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
  peer_data:
  peer2_data:
